<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA System Pro</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center;padding:20px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{cursor:pointer;background:#22c55e;color:#000;font-weight:bold}
.card{background:#1e293b;padding:20px;border-radius:15px;max-width:500px;margin:auto}
</style>
</head>

<body>
<h1>🎓 GPA System (Doctor + Students)</h1>

<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<br>

<div class="card">
<h3>Add / Update Grade</h3>
<input id="studentId" placeholder="Student ID"><br>
<input id="course" placeholder="Course Code"><br>
<input id="grade" placeholder="Grade"><br>
<button onclick="saveGrade()">Save Grade</button>
</div>

<br>

<div class="card">
<h3>Student Data</h3>
<input id="viewId" placeholder="Student ID">
<button onclick="loadStudent()">Load</button>
<pre id="output"></pre>
</div>

<script>

// 🔴 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const DOCTOR_EMAIL = "doctor@email.com";

function isDoctor(){
  return auth.currentUser && auth.currentUser.email === DOCTOR_EMAIL;
}

async function login(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;

  try{
    await auth.signInWithEmailAndPassword(email, pass);
    alert("Logged in ✅");
  }catch(e){
    alert(e.message);
  }
}

async function saveGrade(){
  if(!auth.currentUser){
    alert("Login first"); return;
  }

  if(!isDoctor()){
    alert("Only doctor can edit"); return;
  }

  const id = document.getElementById('studentId').value;
  const course = document.getElementById('course').value;
  const grade = document.getElementById('grade').value;

  await db.collection("students").doc(id).set({
    courses: {
      [course]: grade
    },
    updatedBy: auth.currentUser.email,
    updatedAt: new Date()
  }, { merge:true });

  await db.collection("logs").add({
    studentId: id,
    course,
    grade,
    time: new Date(),
    by: auth.currentUser.email
  });

  alert("Saved ✅");
}

async function loadStudent(){
  const id = document.getElementById('viewId').value;

  const doc = await db.collection("students").doc(id).get();

  if(!doc.exists){
    document.getElementById('output').textContent = "No data";
    return;
  }

  document.getElementById('output').textContent = JSON.stringify(doc.data(), null, 2);
}

</script>

</body>
</html>
